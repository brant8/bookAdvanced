name: storyverse

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '${STORYVERSE_WEB_PORT:-4311}:80'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${STORYVERSE_DB_USER:-storyverse}:${STORYVERSE_DB_PASSWORD:-storyverse_dev}@postgres:5432/${STORYVERSE_DB_NAME:-storyverse}
      STORYVERSE_API_PORT: 4310
      STORYVERSE_AUTH_MODE: ${STORYVERSE_AUTH_MODE:-local}
      STORYVERSE_SECRET_KEY: ${STORYVERSE_SECRET_KEY:-storyverse-local-development-key}
      STORYVERSE_UPLOAD_DIR: /app/data/uploads
      STORYVERSE_GENERATION_TIMEOUT_MS: ${STORYVERSE_GENERATION_TIMEOUT_MS:-600000}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4310/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - ${STORYVERSE_UPLOAD_DIR:-storyverse_uploads}:/app/data/uploads

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${STORYVERSE_DB_NAME:-storyverse}
      POSTGRES_PASSWORD: ${STORYVERSE_DB_PASSWORD:-storyverse_dev}
      POSTGRES_USER: ${STORYVERSE_DB_USER:-storyverse}
    ports:
      - '${STORYVERSE_DB_PORT:-55432}:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${STORYVERSE_DB_USER:-storyverse} -d ${STORYVERSE_DB_NAME:-storyverse}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - ${STORYVERSE_DATA_DIR:-storyverse_postgres_data}:/var/lib/postgresql/data

volumes:
  storyverse_postgres_data:
    name: storyverse_postgres_data
  storyverse_uploads:
    name: storyverse_uploads
