name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run check

      - name: Build workspaces
        run: npm run build

      - name: Validate Docker Compose
        run: docker compose -p storyverse config --quiet

  database:
    name: PostgreSQL integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://storyverse:storyverse_ci@127.0.0.1:5432/storyverse

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: storyverse
          POSTGRES_PASSWORD: storyverse_ci
          POSTGRES_USER: storyverse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U storyverse -d storyverse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Run database smoke test
        run: npm run db:smoke

      - name: Run integration tests
        run: npm run test:integration
